name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, backend]

    steps:
      - name: Clone or Update Backend
        run: |
          if [ ! -d "/home/shanmugavel/backend/.git" ]; then
            rm -rf /home/shanmugavel/backend
            git clone https://github.com/GWC-Data/nea_backend /home/shanmugavel/backend
          fi

          cd /home/shanmugavel/backend
          git fetch origin
          git reset --hard origin/main

      - name: Install Dependencies
        run: |
          cd /home/shanmugavel/backend
          npm install

      - name: Build Backend
        run: |
          cd /home/shanmugavel/backend
          npm run build

      - name: Restart Backend with PM2
        run: |
          cd /home/shanmugavel/backend

          # Ensure pm2 is available
          export PATH=$PATH:/usr/bin:/usr/local/bin:/home/shanmugavel/.npm-global/bin

          # Check if backend already running
          pm2 describe backend > /dev/null 2>&1

          if [ $? -eq 0 ]; then
            echo "Restarting backend..."
            pm2 restart backend
          else
            echo "Starting backend..."

            # YOUR EXACT COMMAND (fixed for CI: single line)
            pm2 start ./dist/index.js --name backend --interpreter ./node_modules/.bin/nodemon --node-args="-r @babel/register -r ./env/config.js" --watch
          fi


          pm2 save