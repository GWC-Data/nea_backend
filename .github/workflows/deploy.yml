name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, backend]

    env:
      HOME: /home/$(whoami)
      PATH: /usr/local/bin:/usr/bin:/bin:/home/$(whoami)/.npm-global/bin

    steps:
      - name: Get Current User
        id: user
        run: echo "USER_NAME=$(whoami)" >> $GITHUB_ENV

      - name: Fix Folder Permissions
        run: |
          sudo mkdir -p /home/$USER_NAME/backend
          sudo chown -R $USER_NAME:$USER_NAME /home/$USER_NAME/backend

      - name: Setup SSH for GitHub
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -f ~/.ssh/id_ed25519 ]; then
            chmod 600 ~/.ssh/id_ed25519
          fi

          if [ -f ~/.ssh/id_ed25519.pub ]; then
            chmod 644 ~/.ssh/id_ed25519.pub
          fi

          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone or Update Backend
        run: |
          if [ ! -d "/home/$USER_NAME/backend/.git" ]; then
            rm -rf /home/$USER_NAME/backend
            git clone git@github.com:GWC-Data/nea_backend.git /home/$USER_NAME/backend
          fi

          cd /home/$USER_NAME/backend
          git fetch origin
          git reset --hard origin/main

      - name: Install Dependencies
        run: |
          cd /home/$USER_NAME/backend
          npm install

      - name: Build Backend
        run: |
          cd /home/$USER_NAME/backend
          npm run build

      - name: Restart Backend with PM2
        run: |
          cd /home/$USER_NAME/backend

          export PATH=$PATH:/home/$USER_NAME/.npm-global/bin

          pm2 describe backend > /dev/null 2>&1

          if [ $? -eq 0 ]; then
            echo "Restarting backend..."
            pm2 restart backend
          else
            echo "Starting backend..."

            pm2 start ./dist/index.js \
              --name backend \
              --interpreter ./node_modules/.bin/nodemon \
              --node-args="-r @babel/register -r ./env/config.js" \
              --watch
          fi

          pm2 save