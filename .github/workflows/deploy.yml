name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, backend]

    env:
      HOME: /home/shanmugavel_muthuraj
      PATH: /usr/local/bin:/usr/bin:/bin:/home/shanmugavel_muthuraj/.npm-global/bin

    steps:
      - name: Fix Folder Permissions
        run: |
          sudo mkdir -p /home/shanmugavel_muthuraj/backend
          sudo chown -R shanmugavel_muthuraj:shanmugavel_muthuraj /home/shanmugavel_muthuraj/backend

      - name: Setup SSH for GitHub
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/id_ed25519.pub
          chmod 644 ~/.ssh/known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone or Update Backend
        run: |
          if [ ! -d "/home/shanmugavel_muthuraj/backend/.git" ]; then
            rm -rf /home/shanmugavel_muthuraj/backend
            git clone git@github.com:GWC-Data/nea_backend.git /home/shanmugavel_muthuraj/backend
          fi

          cd /home/shanmugavel_muthuraj/backend
          git fetch origin
          git reset --hard origin/main

      - name: Install Dependencies
        run: |
          cd /home/shanmugavel_muthuraj/backend
          npm install

      - name: Build Backend
        run: |
          cd /home/shanmugavel_muthuraj/backend
          npm run build

      - name: Restart Backend with PM2
        run: |
          cd /home/shanmugavel_muthuraj/backend

          export PATH=$PATH:/home/shanmugavel_muthuraj/.npm-global/bin

          pm2 describe backend > /dev/null 2>&1

          if [ $? -eq 0 ]; then
            echo "Restarting backend..."
            pm2 restart backend
          else
            echo "Starting backend..."

            pm2 start ./dist/index.js \
              --name backend \
              --interpreter ./node_modules/.bin/nodemon \
              --node-args="-r @babel/register -r ./env/config.js" \
              --watch
          fi

          pm2 save