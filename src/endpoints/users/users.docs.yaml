/users:
  get:
    summary: Get all users
    description: Retrieves a list of all users.
    operationId: getAllUsers
    security:
      - bearerAuth: []
    tags:
      - Users
    responses:
      200:
        description: List of all users
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      firstName:
                        type: string
                        example: "John"
                      lastName:
                        type: string
                        example: "Doe"
                      email:
                        type: string
                        example: "john.doe@example.com"
                      phoneNumber:
                        type: string
                        example: "+1234567890"
                      role:
                        type: string
                        example: "user"
                      team:
                        type: string
                        example: "Engineering"
                      age:
                        type: integer
                        example: 30
                      DOB:
                        type: string
                        format: date
                        example: "1994-03-15"
                      groupId:
                        type: integer
                        example: 1
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
      500:
        description: Server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Error fetching users"
                error:
                  type: string

  post:
    summary: Create a new user
    description: Creates a new user with provided details.
    operationId: createUser
    security:
      - bearerAuth: []
    tags:
      - Users
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - firstName
              - lastName
              - email
              - password
            properties:
              firstName:
                type: string
                example: "Ram"
              lastName:
                type: string
                example: "M"
              email:
                type: string
                format: email
                example: "ram.m@example.com"
              phoneNumber:
                type: string
                example: "+1234567890"
              password:
                type: string
                format: password
                example: "strongpassword123"
              role:
                type: string
                enum: ["admin", "user"]
                default: "user"
                example: "user"
              team:
                type: string
                example: "Engineering"
              age:
                type: integer
                minimum: 0
                maximum: 150
                example: 25
              DOB:
                type: string
                format: date
                example: "1999-01-01"
              groupId:
                type: integer
                example: 1
              createdBy:
                type: integer
                example: 1
              updatedBy:
                type: integer
                example: 1
    responses:
      200:
        description: User created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "User created successfully"
                user:
                  type: object
                  properties:
                    id:
                      type: integer
                    firstName:
                      type: string
                    lastName:
                      type: string
                    email:
                      type: string
                    phoneNumber:
                      type: string
                    role:
                      type: string
                    team:
                      type: string
                    age:
                      type: integer
                    DOB:
                      type: string
                    groupId:
                      type: integer
                    createdAt:
                      type: string
                    updatedAt:
                      type: string
      400:
        description: Validation error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Validation error"
                errors:
                  type: array
      500:
        description: User creation error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Error creating user"
                error:
                  type: string

/users/{id}:
  get:
    summary: Get a user by ID
    description: Retrieves the details of a specific user by ID.
    operationId: getUserById
    security:
      - bearerAuth: []
    tags:
      - Users
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the user to retrieve
        schema:
          type: integer
          example: 1
    responses:
      200:
        description: User details retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    id:
                      type: integer
                    firstName:
                      type: string
                    lastName:
                      type: string
                    email:
                      type: string
                    phoneNumber:
                      type: string
                    role:
                      type: string
                    team:
                      type: string
                    age:
                      type: integer
                    DOB:
                      type: string
                    groupId:
                      type: integer
                    createdBy:
                      type: integer
                    updatedBy:
                      type: integer
                    createdAt:
                      type: string
                    updatedAt:
                      type: string
                    creator:
                      type: object
                      properties:
                        id:
                          type: integer
                        firstName:
                          type: string
                        lastName:
                          type: string
                        email:
                          type: string
                    updater:
                      type: object
                      properties:
                        id:
                          type: integer
                        firstName:
                          type: string
                        lastName:
                          type: string
                        email:
                          type: string
                    group:
                      type: object
                      properties:
                        groupId:
                          type: integer
                        groupName:
                          type: string
      404:
        description: User not found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "User not found"
      500:
        description: Server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Error fetching users"

  put:
    summary: Update a user
    description: Updates the information of a user by ID.
    operationId: updateUser
    security:
      - bearerAuth: []
    tags:
      - Users
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the user to update
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              firstName:
                type: string
                example: "Jane"
              lastName:
                type: string
                example: "Doe"
              email:
                type: string
                format: email
                example: "jane.doe@example.com"
              phoneNumber:
                type: string
                example: "+0987654321"
              role:
                type: string
                enum: ["admin", "user"]
                example: "admin"
              team:
                type: string
                example: "Product"
              age:
                type: integer
                example: 28
              DOB:
                type: string
                format: date
                example: "1996-07-20"
              groupId:
                type: integer
                example: 2
              updatedBy:
                type: integer
                example: 1
    responses:
      200:
        description: User updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "User updated successfully"
                user:
                  type: object
                  properties:
                    id:
                      type: integer
                    firstName:
                      type: string
                    lastName:
                      type: string
                    email:
                      type: string
                    phoneNumber:
                      type: string
                    role:
                      type: string
                    team:
                      type: string
                    age:
                      type: integer
                    DOB:
                      type: string
                    groupId:
                      type: integer
      404:
        description: User not found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "User not found"
      500:
        description: Server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Error updating user"
                error:
                  type: string

  delete:
    summary: Delete a user
    description: Deletes a user by ID.
    operationId: deleteUser
    security:
      - bearerAuth: []
    tags:
      - Users
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the user to delete
        schema:
          type: integer
    responses:
      200:
        description: User deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "User deleted successfully"
      404:
        description: User not found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "User not found"
      500:
        description: Server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Error deleting user"
                error:
                  type: string

# Additional endpoints
/users/role/{role}:
  get:
    summary: Get users by role
    description: Retrieves all users with a specific role.
    operationId: getUsersByRole
    security:
      - bearerAuth: []
    tags:
      - Users
    parameters:
      - name: role
        in: path
        required: true
        description: Role to filter users
        schema:
          type: string
          enum: ["admin", "user"]
    responses:
      200:
        description: Users retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    $ref: '#/components/schemas/User'
      500:
        description: Server error

/users/group/{groupId}:
  get:
    summary: Get users by group
    description: Retrieves all users belonging to a specific group.
    operationId: getUsersByGroup
    security:
      - bearerAuth: []
    tags:
      - Users
    parameters:
      - name: groupId
        in: path
        required: true
        description: Group ID to filter users
        schema:
          type: integer
    responses:
      200:
        description: Users retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    $ref: '#/components/schemas/User'
      500:
        description: Server error

/users/{id}/password:
  put:
    summary: Update user password
    description: Updates the password for a specific user.
    operationId: updateUserPassword
    security:
      - bearerAuth: []
    tags:
      - Users
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the user
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - currentPassword
              - newPassword
            properties:
              currentPassword:
                type: string
                format: password
                example: "oldpassword123"
              newPassword:
                type: string
                format: password
                example: "newpassword123"
    responses:
      200:
        description: Password updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Password updated successfully"
      401:
        description: Current password is incorrect
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: "Current password is incorrect"
      404:
        description: User not found
      500:
        description: Server error

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        role:
          type: string
        team:
          type: string
        age:
          type: integer
        DOB:
          type: string
          format: date
        groupId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time